services:
  app:
    build: .
    # Publishing on 0.0.0.0:8077 makes the app reachable from other hosts on the
    # tailnet by IP (e.g. http://<tailscale-ip>:8077). Host port 8077 chosen to
    # avoid colliding with other containers already using 8000.
    ports:
      - "8077:8000"
    env_file:
      - .env
    restart: unless-stopped
