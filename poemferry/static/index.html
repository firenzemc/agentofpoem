<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>诗渡 · PoemFerry</title>
<style>
  :root {
    --bg: #faf8f3; --ink: #2b2b2b; --muted: #8a8275; --line: #e4ddd0;
    --gold: #7a5c3e; --hit: #fff3c4; --card: #fffdf8;
    --tech: #0e1116; --tech2: #161b22; --cyan: #4fd6c8; --grid: #243040;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: "Songti SC", "Noto Serif CJK SC", Georgia, "Times New Roman", serif;
    line-height: 1.7;
  }
  .mono { font-family: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, monospace; }
  header { padding: 30px 20px 6px; text-align: center; }
  header h1 { margin: 0; font-size: 30px; letter-spacing: 6px; }
  header p { margin: 6px 0 0; color: var(--muted); font-size: 13px; }
  .wrap { max-width: 820px; margin: 0 auto; padding: 14px 20px 90px; }
  .search { display: flex; gap: 8px; margin: 18px 0 6px; }
  .search input {
    flex: 1; padding: 12px 14px; font-size: 16px; border: 1px solid var(--line);
    border-radius: 8px; background: #fff; font-family: inherit;
  }
  .search button {
    padding: 0 22px; font-size: 15px; border: none; border-radius: 8px;
    background: var(--gold); color: #fff; cursor: pointer; font-family: inherit;
  }
  .search button:disabled { opacity: .5; cursor: default; }
  .hint { color: var(--muted); font-size: 12px; }

  /* ── swarm console (tech aesthetic) ── */
  .console {
    background: var(--tech); border-radius: 12px; padding: 14px 16px; margin: 16px 0;
    color: #c9d4e0; display: none;
  }
  .console.on { display: block; }
  .console .row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; color: #7d8aa0; margin-bottom: 10px;
  }
  .console .stage { color: var(--cyan); }
  .stat { color: #c9d4e0; }
  .stat b { color: var(--cyan); }
  .swarm {
    display: flex; flex-wrap: wrap; gap: 4px; max-height: 168px; overflow: hidden;
  }
  .agent {
    width: 16px; height: 16px; border-radius: 3px; border: 1px solid var(--grid);
    background: #11151c; position: relative; transition: all .25s;
  }
  .agent.run {
    border-color: var(--cyan); box-shadow: 0 0 6px rgba(79,214,200,.8);
    animation: pulse 1s infinite;
  }
  .agent.done { border-color: #2a3340; background: #141a22; }
  .agent.hit { background: var(--cyan); border-color: var(--cyan); box-shadow: 0 0 5px rgba(79,214,200,.6); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.45} }
  .barline { height: 3px; background: var(--grid); border-radius: 2px; margin-top: 12px; overflow: hidden; }
  .barline > i { display: block; height: 100%; width: 0; background: var(--cyan); transition: width .3s; }

  /* ── result cards (poem aesthetic) ── */
  .count { font-size: 13px; color: var(--muted); margin: 18px 0 4px; }
  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 10px;
    padding: 18px 20px; margin: 14px 0; box-shadow: 0 1px 2px rgba(0,0,0,.03);
    animation: rise .4s ease both;
  }
  @keyframes rise { from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:none} }
  .card .meta { font-size: 13px; color: var(--muted); margin-bottom: 10px; }
  .card .meta b { color: var(--ink); font-weight: 600; }
  .poem { white-space: pre-wrap; font-size: 18px; margin: 6px 0 14px; }
  .poem mark { background: var(--hit); padding: 0 2px; border-radius: 3px; }
  .why { font-size: 14px; background: #f4efe6; border-left: 3px solid var(--gold);
    padding: 10px 12px; border-radius: 0 6px 6px 0; }
  .aspects { margin: 8px 0 0; }
  .tag { display: inline-block; font-size: 12px; background: #efe7d8; color: var(--gold);
    padding: 2px 8px; border-radius: 10px; margin: 3px 4px 0 0; }
  .conf { float: right; font-size: 12px; color: var(--muted); }
  .src { font-size: 11px; color: var(--muted); margin-top: 10px; }
  .src a { color: var(--muted); }
  .empty { color: var(--muted); text-align: center; padding: 24px; }

  /* ── tabs & browse ── */
  .tabs { display: flex; justify-content: center; gap: 24px; margin-top: 14px; }
  .tabs a {
    color: var(--muted); text-decoration: none; font-size: 15px; letter-spacing: 2px;
    padding: 4px 2px; border-bottom: 2px solid transparent; cursor: pointer;
  }
  .tabs a.on { color: var(--ink); border-bottom-color: var(--gold); }
  .filters { display: flex; flex-wrap: wrap; gap: 6px; margin: 18px 0 4px; align-items: center; }
  .chip {
    font-size: 13px; padding: 3px 12px; border-radius: 14px; cursor: pointer;
    border: 1px solid var(--line); background: #fff; color: var(--muted); font-family: inherit;
  }
  .chip.on { background: var(--gold); border-color: var(--gold); color: #fff; }
  .filters select {
    font-size: 13px; padding: 3px 8px; border: 1px solid var(--line); border-radius: 8px;
    background: #fff; color: var(--ink); font-family: inherit; max-width: 220px;
  }
  .pager { display: flex; justify-content: center; gap: 14px; align-items: center;
    margin: 18px 0; font-size: 13px; color: var(--muted); }
  .pager button {
    border: 1px solid var(--line); background: #fff; border-radius: 8px; padding: 4px 14px;
    cursor: pointer; font-family: inherit; color: var(--ink);
  }
  .pager button:disabled { opacity: .4; cursor: default; }
</style>
</head>
<body>
<header>
  <h1>诗 渡</h1>
  <p>用任意语言描述你想找的诗 · agent 群在多语言公版诗库中为你寻觅 · 仅原文，不翻译</p>
  <nav class="tabs">
    <a id="tab-search" class="on">寻 诗</a>
    <a id="tab-browse">览 诗</a>
  </nav>
</header>
<div class="wrap" id="view-search">
  <div class="search">
    <input id="q" placeholder="例如：一首写深秋黄昏、漂泊者在异乡看见落叶、满怀乡愁的诗" />
    <button id="go">寻 诗</button>
  </div>
  <div class="hint mono" id="hint">语料加载中…</div>

  <div class="console" id="console">
    <div class="row">
      <span class="stage mono" id="stage">待命</span>
      <span class="stat mono" id="stat"></span>
    </div>
    <div class="swarm" id="swarm"></div>
    <div class="barline"><i id="prog"></i></div>
  </div>

  <div class="count" id="count"></div>
  <div id="results"></div>
</div>
<div class="wrap" id="view-browse" style="display:none">
  <div class="filters" id="langChips"></div>
  <div class="filters">
    <select id="authorSel"><option value="">全部作者</option></select>
    <span class="hint" id="browseTotal"></span>
  </div>
  <div id="browseList"></div>
  <div class="pager">
    <button id="prev">上一页</button>
    <span id="pageInfo"></span>
    <button id="next">下一页</button>
  </div>
</div>
<script>
const $ = (id) => document.getElementById(id);
let es = null;

fetch("/api/info").then(r => r.json()).then(d => {
  $("hint").textContent =
    `corpus ${d.poem_count} · lang ${d.languages.join("/") || "—"} · model ${d.model}` +
    (d.has_key ? "" : "  ⚠ DEEPSEEK_API_KEY missing");
}).catch(() => {});

const esc = (s) => (s || "").replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));

function renderPoem(text, evidence) {
  let html = esc(text);
  (evidence || []).forEach(line => {
    const t = (line || "").trim();
    if (t.length < 2) return;
    const safe = esc(t).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    html = html.replace(new RegExp(safe, "g"), "<mark>$&</mark>");
  });
  return html;
}

const results = [];
function repaint() {
  results.sort((a, b) => (b.verdict.confidence || 0) - (a.verdict.confidence || 0));
  $("count").textContent = results.length ? `命中 ${results.length} 首` : "";
  $("results").innerHTML = results.map(({ verdict: v, poem: p }) => {
    const aspects = (v.matched_description_aspects || [])
      .map(a => `<span class="tag">${esc(a)}</span>`).join("");
    const conf = Math.round((v.confidence || 0) * 100);
    const src = p.source_url
      ? `<a href="${esc(p.source_url)}" target="_blank" rel="noopener">${esc(p.source_name)}</a>`
      : esc(p.source_name);
    return `<div class="card">
      <span class="conf mono">匹配 ${conf}%</span>
      <div class="meta"><b>${esc(p.title || "无题")}</b> · ${esc(p.author || "佚名")}
        · ${esc(p.era || "")} · ${esc(p.language)}</div>
      <div class="poem">${renderPoem(p.full_text, v.evidence_lines)}</div>
      <div class="why">${esc(v.explanation)}</div>
      <div class="aspects">${aspects}</div>
      <div class="src mono">src ${src} · license ${esc(p.license)}</div>
    </div>`;
  }).join("");
}

let agents = 0, running = 0, done = 0, hits = 0;
function updateStat() {
  $("stat").innerHTML =
    `<b>${agents}</b> agents · ${running} running · ${done} done · <b>${hits}</b> 命中`;
  $("prog").style.width = (agents ? (done / agents * 100) : 0) + "%";
}

function start() {
  const q = $("q").value.trim();
  if (!q) return;
  if (es) es.close();
  results.length = 0; agents = running = done = hits = 0;
  $("results").innerHTML = ""; $("count").textContent = "";
  $("swarm").innerHTML = ""; $("console").classList.add("on");
  $("go").disabled = true;
  $("stage").textContent = "理解描述…"; $("stat").textContent = ""; $("prog").style.width = "0";

  es = new EventSource("/api/search?q=" + encodeURIComponent(q));
  es.onmessage = (ev) => {
    const m = JSON.parse(ev.data);
    switch (m.type) {
      case "understanding": {
        const i = m.intent || {};
        const bits = [...(i.imagery || []), ...(i.emotion || []), ...(i.setting || [])];
        $("stage").textContent = "意图：" + (bits.join(" · ") || i.intent_summary || "");
        break;
      }
      case "candidates":
        $("stage").textContent += `　▸ 粗筛 ${m.count} 首`;
        break;
      case "swarm_dispatched": {
        agents = m.agents;
        let tiles = "";
        for (let i = 0; i < agents; i++) tiles += `<div class="agent" id="a${i}"></div>`;
        $("swarm").innerHTML = tiles;
        $("stage").textContent = `派出 ${agents} 个 agent，每个审读 ${m.batch_size} 首`;
        updateStat();
        break;
      }
      case "agent_start": {
        running++;
        const t = $("a" + m.agent); if (t) t.className = "agent run";
        updateStat();
        break;
      }
      case "verdict":
        hits++;
        results.push({ verdict: m.verdict, poem: m.poem });
        repaint(); updateStat();
        break;
      case "agent_done": {
        running--; done++;
        const t = $("a" + m.agent);
        if (t) { t.className = "agent done" + (m.hits > 0 ? " hit" : ""); }
        updateStat();
        break;
      }
      case "done":
        $("stage").textContent = `完成 · 命中 ${m.matched} 首`;
        if (!results.length) $("results").innerHTML = '<div class="empty">没有找到匹配的诗，换个描述试试。</div>';
        es.close(); $("go").disabled = false;
        break;
      case "error":
        $("stage").textContent += `　[err:${m.stage || ""}] ${m.message}`;
        break;
    }
  };
  es.onerror = () => { es.close(); $("go").disabled = false; };
}

$("go").onclick = start;
$("q").addEventListener("keydown", (e) => { if (e.key === "Enter") start(); });

/* ── browse view ── */
const LANG_NAMES = { zh: "中文", en: "English", ja: "日本語", fr: "Français", de: "Deutsch" };
const browse = { language: "", author: "", page: 1, langs: [] };

function showView(name) {
  $("view-search").style.display = name === "search" ? "" : "none";
  $("view-browse").style.display = name === "browse" ? "" : "none";
  $("tab-search").className = name === "search" ? "on" : "";
  $("tab-browse").className = name === "browse" ? "on" : "";
  if (name === "browse") loadBrowse();
}
$("tab-search").onclick = () => showView("search");
$("tab-browse").onclick = () => showView("browse");

function chipRow() {
  const all = [["", "全部"]].concat(browse.langs.map(l => [l, LANG_NAMES[l] || l]));
  $("langChips").innerHTML = all.map(([code, name]) =>
    `<button class="chip${browse.language === code ? " on" : ""}" data-lang="${code}">${name}</button>`
  ).join("");
  document.querySelectorAll("#langChips .chip").forEach(b => {
    b.onclick = () => { browse.language = b.dataset.lang; browse.author = ""; browse.page = 1; loadBrowse(); };
  });
}

function poemCard(p) {
  const src = p.source_url
    ? `<a href="${esc(p.source_url)}" target="_blank" rel="noopener">${esc(p.source_name)}</a>`
    : esc(p.source_name);
  return `<div class="card">
    <div class="meta"><b>${esc(p.title || "无题")}</b> · ${esc(p.author || "佚名")}
      · ${esc(p.era || "")} · ${esc(LANG_NAMES[p.language] || p.language)}</div>
    <div class="poem">${esc(p.full_text)}</div>
    <div class="src mono">src ${src} · license ${esc(p.license)}</div>
  </div>`;
}

async function loadBrowse() {
  const params = new URLSearchParams({ page: browse.page, page_size: 20 });
  if (browse.language) params.set("language", browse.language);
  if (browse.author) params.set("author", browse.author);
  const d = await fetch("/api/browse?" + params).then(r => r.json());
  if (!browse.langs.length) {
    const info = await fetch("/api/info").then(r => r.json());
    browse.langs = info.languages;
  }
  chipRow();
  const sel = $("authorSel");
  sel.innerHTML = '<option value="">全部作者</option>' + d.authors.map(([a, n]) =>
    `<option value="${esc(a)}"${a === browse.author ? " selected" : ""}>${esc(a)} (${n})</option>`).join("");
  sel.onchange = () => { browse.author = sel.value; browse.page = 1; loadBrowse(); };
  $("browseTotal").textContent = `共 ${d.total} 首`;
  $("browseList").innerHTML = d.poems.map(poemCard).join("") ||
    '<div class="empty">没有符合条件的诗。</div>';
  const pages = Math.max(1, Math.ceil(d.total / d.page_size));
  $("pageInfo").textContent = `${d.page} / ${pages}`;
  $("prev").disabled = d.page <= 1;
  $("next").disabled = d.page >= pages;
  $("prev").onclick = () => { browse.page--; loadBrowse(); window.scrollTo(0, 0); };
  $("next").onclick = () => { browse.page++; loadBrowse(); window.scrollTo(0, 0); };
}
</script>
</body>
</html>
