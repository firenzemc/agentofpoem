<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>诗渡 · PoemFerry</title>
<style>
  :root {
    --bg:#05070d; --panel:#0b0f17; --panel2:#10151f; --line:#1c2636;
    --cyan:#36e6e0; --magenta:#ff4d9d; --gold:#ffd24d;
    --ink:#cdd9e8; --muted:#5d6e85;
    --k-emotion:#ff4d6d; --k-action:#4da6ff; --k-imagery:#ffd24d;
    --k-setting:#4dffa6; --k-sequence:#b96dff;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--ink);
    font-family:"Songti SC","Noto Serif CJK SC",Georgia,serif; }
  .mono { font-family:ui-monospace,"SF Mono","JetBrains Mono",Menlo,monospace; }
  a { color:var(--cyan); }

  header { padding:22px 20px 8px; text-align:center; position:relative; z-index:3; }
  header h1 { margin:0; font-size:28px; letter-spacing:10px; color:#eaf6ff;
    text-shadow:0 0 12px rgba(54,230,224,.5); }
  header p { margin:6px 0 0; color:var(--muted); font-size:12px; letter-spacing:1px; }
  nav.tabs { display:flex; justify-content:center; gap:26px; margin-top:12px; }
  nav.tabs a { color:var(--muted); cursor:pointer; font-size:14px; letter-spacing:3px;
    padding:4px 2px; border-bottom:2px solid transparent; }
  nav.tabs a.on { color:var(--cyan); border-bottom-color:var(--cyan);
    text-shadow:0 0 8px rgba(54,230,224,.6); }

  .wrap { max-width:1000px; margin:0 auto; padding:6px 18px 90px; position:relative; z-index:3; }
  .search { display:flex; gap:8px; margin:14px 0 6px; }
  .search input { flex:1; padding:13px 15px; font-size:16px; font-family:inherit;
    background:#070b12; color:var(--ink); border:1px solid var(--line); border-radius:8px; }
  .search input:focus { outline:none; border-color:var(--cyan); box-shadow:0 0 10px rgba(54,230,224,.25); }
  .search button { padding:0 24px; font-size:15px; font-family:inherit; cursor:pointer;
    color:#04121a; background:linear-gradient(135deg,var(--cyan),#2bbfd6); border:none; border-radius:8px;
    letter-spacing:2px; font-weight:600; }
  .search button:disabled { opacity:.4; cursor:default; }
  .hint { color:var(--muted); font-size:11px; letter-spacing:.5px; }

  /* digital rain canvas */
  #rain { position:fixed; inset:0; z-index:1; opacity:0; transition:opacity .5s;
    pointer-events:none; }
  #rain.on { opacity:.9; }

  /* status console line */
  .console { margin:14px 0 6px; min-height:18px; font-size:12px; color:var(--cyan);
    letter-spacing:.5px; }
  .console .dim { color:var(--muted); }

  /* expert rail */
  .experts { display:flex; flex-wrap:wrap; gap:8px; margin:8px 0 4px; }
  .enode { font-size:11px; padding:4px 10px; border-radius:14px; border:1px solid currentColor;
    opacity:.5; transition:opacity .25s, box-shadow .25s; }
  .enode.live { opacity:1; box-shadow:0 0 10px currentColor; }
  .enode .ct { color:var(--muted); }

  /* card matrix */
  .matrix { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; margin-top:12px; }
  .pcard { position:relative; background:var(--panel); border:1px solid var(--line); border-radius:8px;
    padding:9px 10px; min-height:96px; overflow:hidden; transition:all .45s ease;
    opacity:0; transform:translateY(8px) scale(.96); }
  .pcard.show { opacity:1; transform:none; }
  .pcard .t { font-size:12px; color:#9fb3cc; margin-bottom:4px; white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis; }
  .pcard .pv { font-size:12px; line-height:1.5; color:#7e90a8; white-space:pre-wrap;
    max-height:64px; overflow:hidden; }
  .pcard .lang { position:absolute; top:6px; right:8px; font-size:9px; color:var(--muted); }
  .pcard.scanning::after { content:""; position:absolute; left:0; right:0; top:0; height:2px;
    background:linear-gradient(90deg,transparent,var(--cyan),transparent);
    animation:scan 1.1s linear infinite; }
  @keyframes scan { 0%{transform:translateY(0)} 100%{transform:translateY(96px)} }
  .pcard.fade { opacity:.12; filter:blur(2px) grayscale(1); transform:scale(.9); }

  /* winners / appreciation */
  .winners { margin-top:22px; }
  .wcard { background:var(--panel2); border:1px solid var(--line); border-radius:12px;
    padding:20px 22px; margin:16px 0; position:relative;
    box-shadow:0 0 0 1px rgba(54,230,224,.15), 0 0 26px rgba(54,230,224,.08);
    animation:rise .55s ease both; }
  @keyframes rise { from{opacity:0; transform:translateY(14px) scale(.97)} to{opacity:1; transform:none} }
  .wcard .conf { position:absolute; top:14px; right:18px; font-size:12px; color:var(--cyan); }
  .wcard .meta { font-size:13px; color:var(--muted); margin-bottom:10px; }
  .wcard .meta b { color:#dbe7f5; font-weight:600; }
  .wcard .poem { white-space:pre-wrap; font-size:18px; color:#e6eefb; margin:6px 0 14px; }
  .wcard .poem mark { background:rgba(255,210,77,.22); color:#ffe8a3; padding:0 2px; border-radius:3px; }
  .poem-wrap { position:relative; }
  .poem-wrap.clamped .poem { max-height:14.5em; overflow:hidden; margin-bottom:0; }
  .poem-wrap.clamped::after { content:""; position:absolute; left:0; right:0; bottom:26px; height:50px;
    background:linear-gradient(transparent,var(--panel2)); pointer-events:none; }
  .unfold { display:block; width:100%; border:none; background:none; cursor:pointer;
    color:var(--cyan); font-size:13px; font-family:inherit; padding:6px 0 2px; }
  .why { font-size:14px; background:rgba(54,230,224,.06); border-left:3px solid var(--cyan);
    padding:10px 12px; border-radius:0 6px 6px 0; color:#bcd; }
  .aspects { margin:8px 0 0; }
  .tag { display:inline-block; font-size:11px; padding:2px 9px; border-radius:11px; margin:3px 5px 0 0;
    border:1px solid currentColor; }
  .src { font-size:10px; color:var(--muted); margin-top:10px; }
  .empty { color:var(--muted); text-align:center; padding:30px; }

  /* browse */
  .filters { display:flex; flex-wrap:wrap; gap:6px; align-items:center; margin:16px 0 4px; }
  .chip { font-size:13px; padding:3px 12px; border-radius:13px; cursor:pointer; font-family:inherit;
    background:var(--panel); border:1px solid var(--line); color:var(--muted); }
  .chip.on { background:var(--cyan); border-color:var(--cyan); color:#04121a; }
  .filters select { font-size:13px; padding:4px 8px; background:var(--panel); color:var(--ink);
    border:1px solid var(--line); border-radius:8px; font-family:inherit; max-width:220px; }
  .pager { display:flex; justify-content:center; gap:14px; align-items:center; margin:18px 0; font-size:13px; color:var(--muted); }
  .pager button { background:var(--panel); border:1px solid var(--line); color:var(--ink); border-radius:8px;
    padding:4px 14px; cursor:pointer; font-family:inherit; }
  .pager button:disabled { opacity:.35; }
</style>
</head>
<body>
<canvas id="rain"></canvas>
<header>
  <h1>诗 渡</h1>
  <p class="mono">CROSS-LINGUAL POETRY SWARM · 任意语言描述，agent 蜂群在公版诗海中打捞 · 仅原文不译</p>
  <nav class="tabs"><a id="tab-search" class="on">寻 诗</a><a id="tab-browse">览 诗</a></nav>
</header>

<div class="wrap" id="view-search">
  <div class="search">
    <input id="q" placeholder="例如：哭了之后喝酒 / 深秋黄昏漂泊异乡的乡愁 / 我记得一句『在天愿作比翼鸟』" />
    <button id="go">寻 诗</button>
  </div>
  <div class="hint mono" id="hint">corpus loading…</div>
  <div class="console mono" id="console"></div>
  <div class="experts" id="experts"></div>
  <div class="matrix" id="matrix"></div>
  <div class="winners" id="winners"></div>
</div>

<div class="wrap" id="view-browse" style="display:none">
  <div class="filters" id="langChips"></div>
  <div class="filters"><select id="authorSel"><option value="">全部作者</option></select>
    <span class="hint mono" id="browseTotal"></span></div>
  <div id="browseList"></div>
  <div class="pager"><button id="prev">上一页</button><span id="pageInfo" class="mono"></span><button id="next">下一页</button></div>
</div>

<script>
const $ = id => document.getElementById(id);
const esc = s => (s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const LANG = {zh:"中文",en:"English",ja:"日本語",fr:"Français",de:"Deutsch",es:"Español",it:"Italiano"};
const KIND_COLOR = {emotion:"var(--k-emotion)",action:"var(--k-action)",imagery:"var(--k-imagery)",
  setting:"var(--k-setting)",sequence:"var(--k-sequence)"};
const KIND_CN = {emotion:"情感",action:"动作",imagery:"意象",setting:"场景",sequence:"时序"};
const slug = s => "a"+(s||"").replace(/[^a-z0-9]+/gi,"_").toLowerCase();

/* ── digital rain ── */
class Rain {
  constructor(canvas){ this.c=canvas; this.ctx=canvas.getContext("2d"); this.pool=["诗","渡"];
    this.cols=[]; this.running=false; this.font=15; window.addEventListener("resize",()=>this.resize()); }
  setPool(lines){ if(lines && lines.length) this.pool=lines; }
  resize(){ this.c.width=innerWidth; this.c.height=innerHeight;
    const n=Math.floor(this.c.width/this.font);
    this.cols=Array.from({length:n},()=>this.newCol(Math.random()*-40)); }
  newCol(y){ const s=this.pool[Math.floor(Math.random()*this.pool.length)]||"诗渡";
    return {s, i:Math.floor(Math.random()*s.length), y, speed:.5+Math.random()*0.9}; }
  start(){ if(this.running) return; this.running=true; this.c.classList.add("on"); this.resize(); this.loop(); }
  stop(){ this.running=false; this.c.classList.remove("on"); }
  loop(){ if(!this.running) return; const {ctx,c}=this;
    ctx.fillStyle="rgba(5,7,13,0.12)"; ctx.fillRect(0,0,c.width,c.height);
    ctx.font=this.font+"px ui-monospace, monospace";
    this.cols.forEach((col,x)=>{ const ch=col.s[col.i%col.s.length]||"诗";
      const py=col.y*this.font;
      ctx.fillStyle="rgba(54,230,224,0.95)"; ctx.fillText(ch, x*this.font, py);
      ctx.fillStyle="rgba(54,230,224,0.28)"; ctx.fillText(col.s[(col.i+1)%col.s.length]||" ", x*this.font, py-this.font);
      col.y+=col.speed; col.i++;
      if(py>c.height && Math.random()>0.975) this.cols[x]=this.newCol(-2); });
    requestAnimationFrame(()=>this.loop()); }
}
const rain = new Rain($("rain"));

/* ── poem clamp toggle (shared) ── */
const CLAMP_LINES = 12;
function poemBlock(text, evidence){
  let html = esc(text);
  (evidence||[]).forEach(l=>{ const t=(l||"").trim(); if(t.length<2) return;
    const safe=esc(t).replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
    html=html.replace(new RegExp(safe,"g"),"<mark>$&</mark>"); });
  if((text.match(/\n/g)||[]).length+1<=CLAMP_LINES) return `<div class="poem">${html}</div>`;
  return `<div class="poem-wrap clamped"><div class="poem">${html}</div><button class="unfold">展开全文 ▾</button></div>`;
}
document.addEventListener("click",e=>{ if(!e.target.classList.contains("unfold")) return;
  const w=e.target.closest(".poem-wrap"); const c=w.classList.toggle("clamped");
  e.target.textContent=c?"展开全文 ▾":"收起 ▴"; });

/* ── boot ── */
fetch("/api/info").then(r=>r.json()).then(d=>{
  $("hint").textContent=`corpus ${d.poem_count} · ${d.languages.join("/")} · retrieval ${d.retrieval}(${d.indexed}) · model ${d.model}`;
});
fetch("/api/sample?n=300").then(r=>r.json()).then(d=>rain.setPool(d.lines)).catch(()=>{});

/* ── search state machine ── */
let es=null;
const state = { cards:{}, hits:{}, winners:[] };

function setConsole(html){ $("console").innerHTML=html; }

function expertNode(c){
  const col=KIND_COLOR[c.kind]||"var(--cyan)";
  return `<span class="enode" id="en-${slug(c.aspect)}" style="color:${col}">
    ${esc(KIND_CN[c.kind]||c.kind)} · ${esc(c.aspect)} <span class="ct" id="ct-${slug(c.aspect)}"></span></span>`;
}

function renderMatrix(cards){
  state.cards={};
  $("matrix").innerHTML = cards.map(c=>{
    state.cards[c.id]={kinds:new Set(), el:null};
    return `<div class="pcard" id="pc-${c.id}">
      <span class="lang mono">${esc(LANG[c.language]||c.language)}</span>
      <div class="t">${esc(c.title||"无题")} · ${esc(c.author||"佚名")}</div>
      <div class="pv">${esc(c.preview||"")}</div></div>`;
  }).join("");
  // stagger reveal (target-lock)
  cards.forEach((c,i)=>{ const el=$("pc-"+c.id); state.cards[c.id].el=el;
    setTimeout(()=>el && el.classList.add("show"), 18*i); });
}

function frameCard(id, kind){
  const card=state.cards[id]; if(!card||!card.el) return;
  card.kinds.add(kind);
  const shadow=[...card.kinds].map((k,i)=>`0 0 0 ${2+i*3}px ${KIND_COLOR[k]||"#fff"}`).join(",");
  card.el.style.boxShadow=shadow;
}

function appreciation(v,p){
  const aspects=(v.matched_description_aspects||[]).map(a=>`<span class="tag" style="color:var(--cyan)">${esc(a)}</span>`).join("");
  const conf=Math.round((v.confidence||0)*100);
  const src=p.source_url?`<a href="${esc(p.source_url)}" target="_blank" rel="noopener">${esc(p.source_name)}</a>`:esc(p.source_name);
  return `<div class="wcard"><span class="conf mono">匹配 ${conf}%</span>
    <div class="meta"><b>${esc(p.title||"无题")}</b> · ${esc(p.author||"佚名")} · ${esc(p.era||"")} · ${esc(LANG[p.language]||p.language)}</div>
    ${poemBlock(p.full_text,v.evidence_lines)}
    <div class="why">${esc(v.explanation)}</div>
    <div class="aspects">${aspects}</div>
    <div class="src mono">src ${src} · license ${esc(p.license)}</div></div>`;
}

function finish(matched, usage){
  // fade non-winners, raise winners
  const winIds=new Set(state.winners.map(w=>w.poem.id));
  Object.entries(state.cards).forEach(([id,c])=>{ if(c.el && !winIds.has(id)) c.el.classList.add("fade"); });
  setTimeout(()=>{
    $("matrix").innerHTML=""; $("experts").innerHTML="";
    state.winners.sort((a,b)=>(b.verdict.confidence||0)-(a.verdict.confidence||0));
    $("winners").innerHTML = state.winners.length
      ? state.winners.map(w=>appreciation(w.verdict,w.poem)).join("")
      : '<div class="empty">蜂群未捞到符合的诗，换个描述再试。</div>';
  },650);
  const u=usage||{}; const tok=u.prompt?((u.prompt+(u.completion||0))/1000).toFixed(1)+"k tok":"";
  setConsole(`<span class="dim">提取完成</span> · 命中 <b>${matched}</b> 首 · ${tok}`);
}

function startSearch(){
  const q=$("q").value.trim(); if(!q) return;
  if(es) es.close();
  state.cards={}; state.hits={}; state.winners=[];
  $("matrix").innerHTML=""; $("winners").innerHTML=""; $("experts").innerHTML="";
  $("go").disabled=true;
  rain.start(); setConsole('<span class="dim">理解描述，向量打捞中…</span>');

  es=new EventSource("/api/search?q="+encodeURIComponent(q));
  es.onmessage=ev=>{
    const m=JSON.parse(ev.data);
    switch(m.type){
      case "understanding": {
        const i=m.intent||{};
        setConsole(`<span class="dim">意图</span> ${esc(i.intent_summary||"")}`);
        break; }
      case "criteria":
        $("experts").innerHTML=m.criteria.map(expertNode).join("");
        break;
      case "retrieved":
        setConsole(`<span class="dim">向量召回</span> ${m.count} 首 · 锁定目标…`);
        break;
      case "fragment_hits":
        setConsole(`<span class="dim">原句精确命中</span> ${m.count} 首 → 直通精读`);
        break;
      case "shortlist":
        setTimeout(()=>rain.stop(), 400);          // state 2: target lock
        renderMatrix(m.cards||[]);
        break;
      case "swarm_dispatched":                      // state 3: swarm scanning
        Object.values(state.cards).forEach(c=>c.el && c.el.classList.add("scanning"));
        document.querySelectorAll(".enode").forEach(n=>n.classList.add("live"));
        setConsole(`<span class="dim">蜂群专家扫描</span> ${m.agents} 个 agent 审读 ${Object.keys(state.cards).length} 张卡片…`);
        break;
      case "expert_hit": {
        frameCard(m.poem_id, m.kind);
        const ct=$("ct-"+slug(m.aspect)); if(ct) ct.textContent="+"+((+ct.textContent.replace("+","")||0)+1);
        break; }
      case "verdict":
        state.winners.push({verdict:m.verdict, poem:m.poem});
        break;
      case "done":
        Object.values(state.cards).forEach(c=>c.el && c.el.classList.remove("scanning"));
        finish(m.matched, m.usage);
        es.close(); $("go").disabled=false;
        break;
      case "error":
        setConsole(`<span style="color:var(--magenta)">[${m.stage||"err"}] ${esc(m.message||"")}</span>`);
        break;
    }
  };
  es.onerror=()=>{ es.close(); $("go").disabled=false; rain.stop(); };
}
$("go").onclick=startSearch;
$("q").addEventListener("keydown",e=>{ if(e.key==="Enter") startSearch(); });

/* ── browse ── */
const browse={language:"",author:"",page:1,langs:[]};
function showView(n){ $("view-search").style.display=n==="search"?"":"none";
  $("view-browse").style.display=n==="browse"?"":"none";
  $("tab-search").className=n==="search"?"on":""; $("tab-browse").className=n==="browse"?"on":"";
  if(n==="browse") loadBrowse(); }
$("tab-search").onclick=()=>showView("search"); $("tab-browse").onclick=()=>showView("browse");
function chipRow(){ const all=[["","全部"]].concat(browse.langs.map(l=>[l,LANG[l]||l]));
  $("langChips").innerHTML=all.map(([c,n])=>`<button class="chip${browse.language===c?" on":""}" data-l="${c}">${n}</button>`).join("");
  document.querySelectorAll("#langChips .chip").forEach(b=>b.onclick=()=>{browse.language=b.dataset.l;browse.author="";browse.page=1;loadBrowse();}); }
function browseCard(p){ const src=p.source_url?`<a href="${esc(p.source_url)}" target="_blank" rel="noopener">${esc(p.source_name)}</a>`:esc(p.source_name);
  return `<div class="wcard"><div class="meta"><b>${esc(p.title||"无题")}</b> · ${esc(p.author||"佚名")} · ${esc(p.era||"")} · ${esc(LANG[p.language]||p.language)}</div>
    ${poemBlock(p.full_text,[])}<div class="src mono">src ${src} · license ${esc(p.license)}</div></div>`; }
async function loadBrowse(){
  const pr=new URLSearchParams({page:browse.page,page_size:20});
  if(browse.language) pr.set("language",browse.language); if(browse.author) pr.set("author",browse.author);
  const d=await fetch("/api/browse?"+pr).then(r=>r.json());
  if(!browse.langs.length){ const i=await fetch("/api/info").then(r=>r.json()); browse.langs=i.languages; }
  chipRow();
  const sel=$("authorSel"); sel.innerHTML='<option value="">全部作者</option>'+d.authors.map(([a,n])=>`<option value="${esc(a)}"${a===browse.author?" selected":""}>${esc(a)} (${n})</option>`).join("");
  sel.onchange=()=>{browse.author=sel.value;browse.page=1;loadBrowse();};
  $("browseTotal").textContent=`共 ${d.total} 首`;
  $("browseList").innerHTML=d.poems.map(browseCard).join("")||'<div class="empty">无</div>';
  const pages=Math.max(1,Math.ceil(d.total/d.page_size));
  $("pageInfo").textContent=`${d.page} / ${pages}`;
  $("prev").disabled=d.page<=1; $("next").disabled=d.page>=pages;
  $("prev").onclick=()=>{browse.page--;loadBrowse();scrollTo(0,0);};
  $("next").onclick=()=>{browse.page++;loadBrowse();scrollTo(0,0);};
}
</script>
</body>
</html>
