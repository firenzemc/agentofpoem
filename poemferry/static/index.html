<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>诗渡 · PoemFerry</title>
<style>
  :root {
    --bg:#05070d; --panel:#0b0f17; --panel2:#10151f; --line:#1c2636;
    --cyan:#36e6e0; --magenta:#ff4d9d; --gold:#ffd24d; --ink:#cdd9e8; --muted:#5d6e85;
    --k-emotion:#ff4d6d; --k-action:#4da6ff; --k-imagery:#ffd24d; --k-setting:#4dffa6; --k-sequence:#b96dff;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; background:var(--bg); color:var(--ink);
    font-family:"Songti SC","Noto Serif CJK SC",Georgia,serif; }
  .mono { font-family:ui-monospace,"SF Mono","JetBrains Mono",Menlo,monospace; }
  a { color:var(--cyan); }
  header { padding:20px 20px 6px; text-align:center; }
  header h1 { margin:0; font-size:27px; letter-spacing:10px; color:#eaf6ff; text-shadow:0 0 12px rgba(54,230,224,.5); }
  header p { margin:6px 0 0; color:var(--muted); font-size:12px; letter-spacing:1px; }
  nav.tabs { display:flex; justify-content:center; gap:26px; margin-top:10px; }
  nav.tabs a { color:var(--muted); cursor:pointer; font-size:14px; letter-spacing:3px; padding:4px 2px; border-bottom:2px solid transparent; }
  nav.tabs a.on { color:var(--cyan); border-bottom-color:var(--cyan); text-shadow:0 0 8px rgba(54,230,224,.6); }
  .wrap { max-width:1040px; margin:0 auto; padding:6px 18px 90px; }
  .search { display:flex; gap:8px; margin:14px 0 6px; }
  .search input { flex:1; padding:13px 15px; font-size:16px; font-family:inherit; background:#070b12; color:var(--ink); border:1px solid var(--line); border-radius:8px; }
  .search input:focus { outline:none; border-color:var(--cyan); box-shadow:0 0 10px rgba(54,230,224,.25); }
  .search select { background:#070b12; color:var(--ink); border:1px solid var(--line); border-radius:8px; font-family:inherit; font-size:13px; padding:0 8px; }
  .search button { padding:0 24px; font-size:15px; font-family:inherit; cursor:pointer; color:#04121a; background:linear-gradient(135deg,var(--cyan),#2bbfd6); border:none; border-radius:8px; letter-spacing:2px; font-weight:600; }
  .search button:disabled { opacity:.4; cursor:default; }
  .hint { color:var(--muted); font-size:11px; }
  .console { margin:12px 0 8px; min-height:18px; font-size:12px; color:var(--cyan); letter-spacing:.4px; }
  .console .dim { color:var(--muted); }
  .experts { display:flex; flex-wrap:wrap; gap:8px; margin:6px 0; }
  .enode { font-size:11px; padding:4px 10px; border-radius:14px; border:1px solid currentColor; opacity:.45; transition:opacity .25s, box-shadow .25s; }
  .enode.live { opacity:1; box-shadow:0 0 10px currentColor; }
  .enode .ct { color:var(--muted); }
  /* funnel dot grid */
  .gridwrap { position:relative; border:1px solid var(--line); border-radius:10px; background:#070a10; padding:8px; margin:8px 0; }
  #grid { display:block; width:100%; }
  .legend { display:flex; gap:14px; flex-wrap:wrap; font-size:10px; color:var(--muted); margin-top:6px; }
  .legend i { display:inline-block; width:8px; height:8px; border-radius:2px; margin-right:4px; vertical-align:middle; }
  /* winners */
  .winners { margin-top:18px; }
  .wcard { background:var(--panel2); border:1px solid var(--line); border-radius:12px; padding:20px 22px; margin:16px 0; position:relative;
    box-shadow:0 0 0 1px rgba(54,230,224,.15), 0 0 26px rgba(54,230,224,.07); animation:rise .55s ease both; }
  @keyframes rise { from{opacity:0; transform:translateY(14px) scale(.97)} to{opacity:1; transform:none} }
  .wcard .conf { position:absolute; top:14px; right:18px; font-size:12px; color:var(--cyan); }
  .wcard .meta { font-size:13px; color:var(--muted); margin-bottom:10px; }
  .wcard .meta b { color:#dbe7f5; font-weight:600; }
  .wcard .poem { white-space:pre-wrap; font-size:18px; color:#e6eefb; margin:6px 0 14px; }
  .wcard .poem mark { background:rgba(255,210,77,.22); color:#ffe8a3; padding:0 2px; border-radius:3px; }
  .poem-wrap { position:relative; }
  .poem-wrap.clamped .poem { max-height:14.5em; overflow:hidden; margin-bottom:0; }
  .poem-wrap.clamped::after { content:""; position:absolute; left:0; right:0; bottom:26px; height:50px; background:linear-gradient(transparent,var(--panel2)); pointer-events:none; }
  .unfold { display:block; width:100%; border:none; background:none; cursor:pointer; color:var(--cyan); font-size:13px; font-family:inherit; padding:6px 0 2px; }
  .why { font-size:14px; background:rgba(54,230,224,.06); border-left:3px solid var(--cyan); padding:10px 12px; border-radius:0 6px 6px 0; color:#bcd; }
  .aspects { margin:8px 0 0; }
  .tag { display:inline-block; font-size:11px; padding:2px 9px; border-radius:11px; margin:3px 5px 0 0; border:1px solid currentColor; }
  .src { font-size:10px; color:var(--muted); margin-top:10px; }
  .empty { color:var(--muted); text-align:center; padding:30px; }
  /* browse */
  .filters { display:flex; flex-wrap:wrap; gap:6px; align-items:center; margin:16px 0 4px; }
  .chip { font-size:13px; padding:3px 12px; border-radius:13px; cursor:pointer; font-family:inherit; background:var(--panel); border:1px solid var(--line); color:var(--muted); }
  .chip.on { background:var(--cyan); border-color:var(--cyan); color:#04121a; }
  .filters select { font-size:13px; padding:4px 8px; background:var(--panel); color:var(--ink); border:1px solid var(--line); border-radius:8px; font-family:inherit; max-width:220px; }
  .pager { display:flex; justify-content:center; gap:14px; align-items:center; margin:18px 0; font-size:13px; color:var(--muted); }
  .pager button { background:var(--panel); border:1px solid var(--line); color:var(--ink); border-radius:8px; padding:4px 14px; cursor:pointer; font-family:inherit; }
  .pager button:disabled { opacity:.35; }
</style>
</head>
<body>
<header>
  <h1>诗 渡</h1>
  <p class="mono">CROSS-LINGUAL POETRY SWARM · 任意语言描述，漏斗逐层点亮全库诗海 · 仅原文不译</p>
  <nav class="tabs"><a id="tab-search" class="on">寻 诗</a><a id="tab-browse">览 诗</a><a id="tab-thanks">致 谢</a></nav>
</header>

<div class="wrap" id="view-search">
  <div class="search">
    <input id="q" placeholder="例如：有关河流与天地广阔 / 哭了之后喝酒 / 我记得一句『在天愿作比翼鸟』" />
    <select id="mode" title="检索方式">
      <option value="hybrid">混合(全通道)</option>
      <option value="image">语义(gist+意象)</option>
      <option value="keyword">关键词(字面)</option>
      <option value="concept">概念扩展(跨语言)</option>
    </select>
    <button id="go">寻 诗</button>
  </div>
  <div class="hint mono" id="hint">corpus loading…</div>
  <div class="console mono" id="console"></div>
  <div class="experts" id="experts"></div>
  <div class="gridwrap"><canvas id="grid"></canvas>
    <div class="legend">
      <span><i style="background:#222e3e"></i>全库</span>
      <span><i style="background:var(--cyan)"></i>向量召回</span>
      <span><i style="background:#bff"></i>入围精读</span>
      <span><i style="background:var(--k-emotion)"></i>情感</span>
      <span><i style="background:var(--k-action)"></i>动作</span>
      <span><i style="background:var(--k-imagery)"></i>意象</span>
      <span><i style="background:var(--gold)"></i>命中</span>
    </div>
  </div>
  <div class="winners" id="winners"></div>
</div>

<div class="wrap" id="view-thanks" style="display:none">
  <p class="hint mono" style="margin:14px 0">本站诗词全部来自以下公共领域 / 开放许可的语料源，谨此致谢。点击可访问出处。</p>
  <div id="thanksList"></div>
</div>

<div class="wrap" id="view-browse" style="display:none">
  <div class="filters" id="langChips"></div>
  <div class="filters"><select id="authorSel"><option value="">全部作者</option></select><span class="hint mono" id="browseTotal"></span></div>
  <div id="browseList"></div>
  <div class="pager"><button id="prev">上一页</button><span id="pageInfo" class="mono"></span><button id="next">下一页</button></div>
</div>

<script>
const $ = id => document.getElementById(id);
const esc = s => (s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const LANG = {zh:"中文",en:"English",ja:"日本語",fr:"Français",de:"Deutsch",es:"Español",it:"Italiano"};
const KIND_COLOR = {emotion:"#ff4d6d",action:"#4da6ff",imagery:"#ffd24d",setting:"#4dffa6",sequence:"#b96dff"};
const KIND_CN = {emotion:"情感",action:"动作",imagery:"意象",setting:"场景",sequence:"时序"};
const slug = s => "a"+(s||"").replace(/[^a-z0-9]+/gi,"_").toLowerCase();

/* ── funnel dot grid ── */
class Grid {
  constructor(c){ this.c=c; this.ctx=c.getContext("2d"); this.ids=[]; this.idx={}; this.anim=false;
    addEventListener("resize",()=>{ this.layout(); this.draw(); }); }
  setCorpus(ids){ this.ids=ids; this.idx={}; ids.forEach((id,i)=>this.idx[id]=i);
    this.level=new Uint8Array(ids.length); this.kc=new Array(ids.length).fill(null);
    this.layout(); this.draw(); }
  layout(){ const w=this.c.clientWidth||960; this.cell=6; this.cols=Math.max(20,Math.floor(w/this.cell));
    this.rows=Math.ceil(this.ids.length/this.cols);
    this.c.width=this.cols*this.cell; this.c.height=this.rows*this.cell; }
  reset(){ if(this.level){ this.level.fill(0); this.kc.fill(null); } }
  setLevel(ids, lv){ ids.forEach(id=>{ const i=this.idx[id]; if(i!=null && this.level[i]<lv) this.level[i]=lv; }); }
  onlyLevel(ids, lv){ const keep=new Set(ids.map(id=>this.idx[id])); for(let i=0;i<this.level.length;i++){ if(this.level[i]===lv-1 && !keep.has(i)) this.level[i]=1; } this.setLevel(ids,lv); }
  flare(id, kind){ const i=this.idx[id]; if(i!=null){ this.kc[i]=KIND_COLOR[kind]||"#fff"; if(this.level[i]<2) this.level[i]=2; } }
  winners(ids){ ids.forEach(id=>{ const i=this.idx[id]; if(i!=null) this.level[i]=4; }); }
  start(){ if(this.anim) return; this.anim=true; this.loop(); }
  stop(){ this.anim=false; this.draw(); }
  loop(){ if(!this.anim) return; this.draw(performance.now()); requestAnimationFrame(()=>this.loop()); }
  draw(t){ const {ctx,cell}=this; if(!this.ids.length) return;
    ctx.clearRect(0,0,this.c.width,this.c.height);
    const pulse=0.6+0.4*Math.sin((t||0)/350);
    for(let i=0;i<this.ids.length;i++){
      const col=i%this.cols, row=(i/this.cols)|0, x=col*cell, y=row*cell, lv=this.level[i];
      let color="#1a2331", size=cell-2;
      if(lv===1){ color="rgba(54,230,224,0.85)"; }
      else if(lv===2){ color=this.kc[i]||("rgba(180,255,250,"+(0.7+0.3*pulse)+")"); size=cell-1; }
      else if(lv===4){ color="#ffd24d"; size=cell;
        ctx.shadowColor="#ffd24d"; ctx.shadowBlur=6; }
      ctx.fillStyle=color; ctx.fillRect(x, y, size, size); ctx.shadowBlur=0;
    } }
}
const grid = new Grid($("grid"));

/* ── poem clamp ── */
const CLAMP_LINES=12;
function poemBlock(text, ev){ let h=esc(text);
  (ev||[]).forEach(l=>{ const t=(l||"").trim(); if(t.length<2) return;
    h=h.replace(new RegExp(esc(t).replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"g"),"<mark>$&</mark>"); });
  if((text.match(/\n/g)||[]).length+1<=CLAMP_LINES) return `<div class="poem">${h}</div>`;
  return `<div class="poem-wrap clamped"><div class="poem">${h}</div><button class="unfold">展开全文 ▾</button></div>`; }
document.addEventListener("click",e=>{ if(!e.target.classList.contains("unfold")) return;
  const w=e.target.closest(".poem-wrap"); const c=w.classList.toggle("clamped"); e.target.textContent=c?"展开全文 ▾":"收起 ▴"; });

/* ── boot ── */
fetch("/api/info").then(r=>r.json()).then(d=>{
  $("hint").textContent=`corpus ${d.poem_count} · ${d.languages.join("/")} · doc ${d.doc_indexed} · line ${d.line_vectors} · model ${d.model}`;
  if(d.retrieval) $("mode").value=d.retrieval;
});
fetch("/api/corpus").then(r=>r.json()).then(d=>grid.setCorpus(d.ids)).catch(()=>{});

/* ── search ── */
let es=null;
const state={winners:[]};
const setC=h=>$("console").innerHTML=h;

function startSearch(){
  const q=$("q").value.trim(); if(!q) return;
  if(es) es.close();
  state.winners=[]; $("winners").innerHTML=""; $("experts").innerHTML="";
  grid.reset(); grid.start(); $("go").disabled=true;
  setC('<span class="dim">理解描述 · 向量打捞全库…</span>');
  const mode=$("mode").value;
  es=new EventSource(`/api/search?retrieval=${mode}&q=`+encodeURIComponent(q));
  es.onmessage=ev=>{
    const m=JSON.parse(ev.data);
    switch(m.type){
      case "understanding": setC(`<span class="dim">意图</span> ${esc((m.intent||{}).intent_summary||"")}`); break;
      case "criteria":
        $("experts").innerHTML=m.criteria.map(c=>{ const col=KIND_COLOR[c.kind]||"var(--cyan)";
          return `<span class="enode" style="color:${col}">${esc(KIND_CN[c.kind]||c.kind)} · ${esc(c.aspect)} <span class="ct" id="ct-${slug(c.aspect)}"></span></span>`; }).join("");
        break;
      case "retrieved":
        grid.setLevel(m.ids||[],1);
        setC(`<span class="dim">[${esc(m.mode)}] 向量召回</span> ${m.count} 首 → 锁定`);
        break;
      case "fragment_hits": setC(`<span class="dim">原句精确命中</span> ${m.count} 首 → 直通精读`); break;
      case "shortlist":
        grid.onlyLevel((m.cards||[]).map(c=>c.id),2);
        document.querySelectorAll(".enode").forEach(n=>n.classList.add("live"));
        setC(`<span class="dim">入围精读</span> ${m.count} 首 · 蜂群专家审读中…`);
        break;
      case "expert_hit": {
        grid.flare(m.poem_id,m.kind);
        const ct=$("ct-"+slug(m.aspect)); if(ct) ct.textContent="+"+((+ct.textContent.replace("+","")||0)+1);
        break; }
      case "verdict": state.winners.push({verdict:m.verdict,poem:m.poem}); break;
      case "done":
        grid.winners(state.winners.map(w=>w.poem.id)); grid.draw();
        setTimeout(()=>grid.stop(),1200);
        state.winners.sort((a,b)=>(b.verdict.confidence||0)-(a.verdict.confidence||0));
        $("winners").innerHTML=state.winners.length?state.winners.map(w=>appreciation(w.verdict,w.poem)).join(""):'<div class="empty">蜂群未捞到符合的诗，换个描述或检索方式再试。</div>';
        const u=m.usage||{}; const tok=u.prompt?((u.prompt+(u.completion||0))/1000).toFixed(1)+"k tok":"";
        setC(`<span class="dim">提取完成</span> · 命中 <b>${m.matched}</b> 首 · ${tok}`);
        es.close(); $("go").disabled=false; break;
      case "error": setC(`<span style="color:var(--magenta)">[${m.stage||"err"}] ${esc(m.message||"")}</span>`); break;
    }
  };
  es.onerror=()=>{ es.close(); $("go").disabled=false; grid.stop(); };
}
function appreciation(v,p){
  const aspects=(v.matched_description_aspects||[]).map(a=>`<span class="tag" style="color:var(--cyan)">${esc(a)}</span>`).join("");
  const src=p.source_url?`<a href="${esc(p.source_url)}" target="_blank" rel="noopener">${esc(p.source_name)}</a>`:esc(p.source_name);
  return `<div class="wcard"><span class="conf mono">匹配 ${Math.round((v.confidence||0)*100)}%</span>
    <div class="meta"><b>${esc(p.title||"无题")}</b> · ${esc(p.author||"佚名")} · ${esc(p.era||"")} · ${esc(LANG[p.language]||p.language)}</div>
    ${poemBlock(p.full_text,v.evidence_lines)}<div class="why">${esc(v.explanation)}</div>
    <div class="aspects">${aspects}</div><div class="src mono">src ${src} · license ${esc(p.license)}</div></div>`;
}
$("go").onclick=startSearch;
$("q").addEventListener("keydown",e=>{ if(e.key==="Enter") startSearch(); });

/* ── browse ── */
const browse={language:"",author:"",page:1,langs:[]};
function showView(n){
  for(const v of ["search","browse","thanks"]) $("view-"+v).style.display=n===v?"":"none";
  for(const v of ["search","browse","thanks"]) $("tab-"+v).className=n===v?"on":"";
  if(n==="browse") loadBrowse(); if(n==="thanks") loadThanks(); }
$("tab-search").onclick=()=>showView("search"); $("tab-browse").onclick=()=>showView("browse");
$("tab-thanks").onclick=()=>showView("thanks");

async function loadThanks(){
  const d=await fetch("/api/sources").then(r=>r.json());
  $("thanksList").innerHTML=`<div class="hint mono" style="margin-bottom:10px">共 ${d.total} 首 · ${d.sources.length} 个语料源</div>`+
    d.sources.map(s=>{
      const link=s.url?`<a href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.source)}</a>`:esc(s.source);
      return `<div class="wcard"><div class="meta"><b>${link}</b> · ${s.count} 首 · ${s.languages.map(l=>LANG[l]||l).join("/")}</div>
        <div class="src mono">license: ${esc(s.license)}</div></div>`;
    }).join("");
}
function bcard(p){ const src=p.source_url?`<a href="${esc(p.source_url)}" target="_blank" rel="noopener">${esc(p.source_name)}</a>`:esc(p.source_name);
  return `<div class="wcard"><div class="meta"><b>${esc(p.title||"无题")}</b> · ${esc(p.author||"佚名")} · ${esc(p.era||"")} · ${esc(LANG[p.language]||p.language)}</div>${poemBlock(p.full_text,[])}<div class="src mono">src ${src} · license ${esc(p.license)}</div></div>`; }
async function loadBrowse(){
  const pr=new URLSearchParams({page:browse.page,page_size:20});
  if(browse.language) pr.set("language",browse.language); if(browse.author) pr.set("author",browse.author);
  const d=await fetch("/api/browse?"+pr).then(r=>r.json());
  if(!browse.langs.length){ const i=await fetch("/api/info").then(r=>r.json()); browse.langs=i.languages; }
  const all=[["","全部"]].concat(browse.langs.map(l=>[l,LANG[l]||l]));
  $("langChips").innerHTML=all.map(([c,n])=>`<button class="chip${browse.language===c?" on":""}" data-l="${c}">${n}</button>`).join("");
  document.querySelectorAll("#langChips .chip").forEach(b=>b.onclick=()=>{browse.language=b.dataset.l;browse.author="";browse.page=1;loadBrowse();});
  const sel=$("authorSel"); sel.innerHTML='<option value="">全部作者</option>'+d.authors.map(([a,n])=>`<option value="${esc(a)}"${a===browse.author?" selected":""}>${esc(a)} (${n})</option>`).join("");
  sel.onchange=()=>{browse.author=sel.value;browse.page=1;loadBrowse();};
  $("browseTotal").textContent=`共 ${d.total} 首`;
  $("browseList").innerHTML=d.poems.map(bcard).join("")||'<div class="empty">无</div>';
  const pages=Math.max(1,Math.ceil(d.total/d.page_size));
  $("pageInfo").textContent=`${d.page} / ${pages}`; $("prev").disabled=d.page<=1; $("next").disabled=d.page>=pages;
  $("prev").onclick=()=>{browse.page--;loadBrowse();scrollTo(0,0);}; $("next").onclick=()=>{browse.page++;loadBrowse();scrollTo(0,0);};
}
</script>
</body>
</html>
